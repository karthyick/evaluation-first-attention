# EFA Experiment — MiniMax M2.5 (generation) + MiniMax M2.5 (evaluation)
# Same-model experiment with MiniMax — fast cloud API, no Ollama timeout issues
# For cross-model: pair with Ollama results from previous runs

generator_model: "openai/MiniMax-M2.5"
evaluator_model: "openai/MiniMax-M2.5"

# MiniMax API config (OpenAI-compatible endpoint)
gen_api_base: "https://api.minimax.io/v1"
gen_api_key: "${MINIMAX_API_KEY}"
eval_api_base: "https://api.minimax.io/v1"
eval_api_key: "${MINIMAX_API_KEY}"

n_criteria: 3
threshold: 0.6
max_iterations: 2
alpha: 2.0
epsilon: 0.1
batched_eval: false

# Rate limit pacing — MiniMax handles concurrent well
gen_call_delay: 0.3
eval_call_delay: 0.3

prompt_source: "sample"
max_prompts: 5

baselines:
  - single-pass
  - self-refine
  - rubric-then-score
  - all-criteria-at-once
  - uniform-reattention
  - best-of-n

best_of_n_samples: 5

ablations:
  - efa-no-dyncriteria
  - efa-no-cmpg
  - efa-no-fwrl
  - efa-no-iteration

results_dir: "experiments/results"
save_responses: true
