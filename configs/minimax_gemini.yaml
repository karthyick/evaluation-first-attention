# EFA Experiment — MiniMax (generation) + Gemini (evaluation)
# TRUE cross-family: MiniMax-M2.5 (MiniMax) → Gemini 2.0 Flash (Google)
# Maximum diversity = strongest evidence against self-preference bias

generator_model: "minimax/MiniMax-M2.5"
evaluator_model: "gemini/gemini-2.0-flash"

n_criteria: 5
threshold: 0.6
max_iterations: 3
alpha: 2.0
epsilon: 0.1
batched_eval: false

# Rate limits: MiniMax generous, Gemini 15 RPM free tier
gen_call_delay: 1.0
eval_call_delay: 4.0

prompt_source: "sample"
max_prompts: 5

baselines:
  - single-pass
  - self-refine
  - rubric-then-score
  - all-criteria-at-once
  - uniform-reattention
  - best-of-n

best_of_n_samples: 5

ablations:
  - efa-no-dyncriteria
  - efa-no-cmpg
  - efa-no-fwrl
  - efa-no-iteration

results_dir: "experiments/results"
save_responses: true
