# EFA Experiment — Ollama Local (zero cost, no rate limits)
# Using qwen3.5:9b for both generation and evaluation

generator_model: "ollama/qwen3.5:9b"
evaluator_model: "ollama/qwen3.5:9b"

n_criteria: 3
threshold: 0.6
max_iterations: 2
alpha: 2.0
epsilon: 0.1
batched_eval: false

prompt_source: "sample"
max_prompts: 5

baselines:
  - single-pass
  - self-refine
  - rubric-then-score
  - all-criteria-at-once
  - uniform-reattention
  - best-of-n

best_of_n_samples: 3

ablations:
  - efa-no-dyncriteria
  - efa-no-cmpg
  - efa-no-fwrl
  - efa-no-iteration

results_dir: "experiments/results"
save_responses: true
